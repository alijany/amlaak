version: "3.8"
name: ${PROJECT_NAME}


# Networks:
# - traefik-public: External network managed by standalone Traefik container
#   (created via init.sh or manually with: docker network create traefik-public)
# - app: Internal network for this project's services (db, api)
# - shared: External network for shared infrastructure (redis, rustfs) — name set by SHARED_NETWORK env var
networks:
  traefik-public:
    external: true
    name: traefik-public
  app:
    name: ${PROJECT_NAME}
  shared:
    external: true
    name: ${SHARED_NETWORK}

services:
  api:
    container_name: ${PROJECT_NAME}-api
    build:
      context: .
      dockerfile: apps/core-api/Dockerfile
      args:
        PROJECT_NAME: ${PROJECT_NAME}
    restart: always
    env_file:
      - .env
    networks:
      - traefik-public  # For external access via Traefik
      - app             # For internal communication with db
      - shared          # For shared infrastructure: redis, rustfs
    depends_on:
      db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.${PROJECT_NAME}-api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api/v1`)
      - traefik.http.routers.${PROJECT_NAME}-api.priority=10
      - traefik.http.routers.${PROJECT_NAME}-api.entrypoints=websecure
      - traefik.http.routers.${PROJECT_NAME}-api.tls.certresolver=letsencrypt
      - traefik.http.services.${PROJECT_NAME}-api.loadbalancer.server.port=4000

  db:
    image: postgres:15
    restart: always
    env_file:
      - .env
    networks:
      - app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
      interval: 30s
      timeout: 10s
      retries: 5

  pwa:
    container_name: ${PROJECT_NAME}-pwa
    build:
      context: .
      dockerfile: apps/pwa/Dockerfile
      target: runner
      network: host
      args:
        PROJECT_NAME: ${PROJECT_NAME}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_CLARITY_PROJECT_ID: ${NEXT_PUBLIC_CLARITY_PROJECT_ID}
    restart: always
    env_file:
      - .env
    networks:
      - traefik-public  # For external access via Traefik
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.${PROJECT_NAME}-pwa.rule=Host(`${DOMAIN}`) || Header(`User-Agent`, `Clarity-Bot`)
      - traefik.http.routers.${PROJECT_NAME}-pwa.priority=1
      - traefik.http.routers.${PROJECT_NAME}-pwa.entrypoints=websecure
      - traefik.http.routers.${PROJECT_NAME}-pwa.tls.certresolver=letsencrypt
      - traefik.http.services.${PROJECT_NAME}-pwa.loadbalancer.server.port=4000

  # Camoufox stealth-browser sidecar for the crawler (optional).
  # Uncomment to enable real browser automation. The Mock crawler target works
  # without it. The api reads CAMOFOX_BASE_URL=http://camofox:9377.
  # See docs/crawler/developer/browser-gateway-camofox.md
  camofox:
    container_name: ${PROJECT_NAME}-camofox
    build:
      context: .
      dockerfile: docker/camofox.Dockerfile
    restart: always
    env_file:
      - .env
    networks:
      - app
    volumes:
      - browser_data:/root/.camofox
    security_opt:
      - no-new-privileges:true

  # Xray proxy sidecar for reaching api.telegram.org where it is blocked
  # (optional). The api connects to it on the internal `app` network via
  # TELEGRAM_PROXY_URL=socks5h://xray:1080 (SOCKS5 inbound; HTTP inbound on
  # :1081). The config is NOT in the repo — provision it on the server at the
  # predefined path below and fill in your VLESS server (see the devcontainer's
  # .devcontainer/xray-config.json for a template):
  #   sudo mkdir -p /opt/xray && sudo $EDITOR /opt/xray/config.json
  # Uncomment to enable, then set TELEGRAM_PROXY_URL in .env.
  xray:
    container_name: ${PROJECT_NAME}-xray
    image: teddysun/xray:latest
    restart: always
    networks:
      - app
    volumes:
      - /opt/xray/config.json:/etc/xray/config.json:ro
    security_opt:
      - no-new-privileges:true


volumes:
  postgres_data:
  browser_data:
