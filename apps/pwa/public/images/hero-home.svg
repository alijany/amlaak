<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="City skyline at dusk">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.5" stop-color="#21304b"/>
      <stop offset="0.78" stop-color="#46506a"/>
      <stop offset="1" stop-color="#b96a39"/>
    </linearGradient>
    <linearGradient id="far" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a3a57"/>
      <stop offset="1" stop-color="#1c2740"/>
    </linearGradient>
    <linearGradient id="near" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#121d31"/>
      <stop offset="1" stop-color="#0a1120"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="600" fill="url(#sky)"/>

  <!-- warm horizon glow -->
  <ellipse cx="760" cy="540" rx="820" ry="150" fill="#e08a3c" opacity="0.30"/>
  <circle cx="1080" cy="470" r="46" fill="#f4b15e" opacity="0.55"/>

  <!-- far skyline -->
  <g fill="url(#far)">
    <rect x="40" y="380" width="90" height="220"/>
    <rect x="150" y="330" width="70" height="270"/>
    <rect x="250" y="400" width="110" height="200"/>
    <rect x="390" y="350" width="80" height="250"/>
    <rect x="500" y="300" width="64" height="300"/>
    <rect x="600" y="370" width="120" height="230"/>
    <rect x="760" y="330" width="78" height="270"/>
    <rect x="870" y="390" width="100" height="210"/>
    <rect x="1000" y="340" width="72" height="260"/>
    <rect x="1100" y="300" width="96" height="300"/>
    <rect x="1230" y="370" width="84" height="230"/>
    <rect x="1340" y="350" width="80" height="250"/>
  </g>

  <!-- near skyline -->
  <g fill="url(#near)">
    <rect x="0" y="450" width="150" height="150"/>
    <rect x="170" y="420" width="120" height="180"/>
    <rect x="320" y="470" width="140" height="130"/>
    <rect x="470" y="430" width="110" height="170"/>
    <rect x="600" y="460" width="160" height="140"/>
    <rect x="790" y="425" width="120" height="175"/>
    <rect x="930" y="465" width="150" height="135"/>
    <rect x="1100" y="435" width="120" height="165"/>
    <rect x="1240" y="470" width="200" height="130"/>
  </g>

  <!-- lit windows -->
  <g fill="#f6c66b" opacity="0.5">
    <rect x="195" y="445" width="8" height="12"/>
    <rect x="215" y="445" width="8" height="12"/>
    <rect x="195" y="475" width="8" height="12"/>
    <rect x="500" y="455" width="8" height="12"/>
    <rect x="520" y="455" width="8" height="12"/>
    <rect x="500" y="485" width="8" height="12"/>
    <rect x="820" y="450" width="8" height="12"/>
    <rect x="840" y="450" width="8" height="12"/>
    <rect x="820" y="480" width="8" height="12"/>
    <rect x="1130" y="460" width="8" height="12"/>
    <rect x="1150" y="460" width="8" height="12"/>
    <rect x="1130" y="490" width="8" height="12"/>
  </g>
</svg>
