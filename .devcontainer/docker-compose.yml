services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../..:/workspaces:cached
      - /var/run/docker.sock:/var/run/docker.sock
    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity
    # Runs app on the same network as the database container, allows "forwardPorts" in devcontainer.json function.
    network_mode: service:db
    # Use "forwardPorts" in **devcontainer.json** to forward an app port locally.
    # (Adding the "ports" property to this file will not forward from a Codespace.)

  db:
    image: postgres:17-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data
    env_file:
      - ./.env.example


  redis:
    image: redis:7.4-alpine
    env_file:
      - ./.env.example
    # Add "forwardPorts": ["5432"] to **devcontainer.json** to forward PostgreSQL locally.
    # (Adding the "ports" property to this file will not forward from a Codespace.)

  rustfs:
    image: rustfs/rustfs:latest
    env_file:
      - ./.env.example
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:-rustfsadmin}
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_VOLUMES: /data
    volumes:
      - rustfs-data:/data

  nginx:
    image: nginx:1.27-alpine
    network_mode: service:app
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  # Optional Camoufox stealth-browser sidecar for the crawler. The Mock target
  # works without it; uncomment + set CAMOFOX_BASE_URL=http://camofox:9377 to do
  # real browser automation. See docs/crawler/developer/browser-gateway-camofox.md
  camofox:
    build:
      context: ..
      dockerfile: docker/camofox.Dockerfile
    env_file:
      - ./.env.example
    volumes:
      - browser-data:/root/.camofox

  # Xray proxy sidecar. Exposes a local SOCKS5 inbound on :1080 (and HTTP on
  # :1081) that the backend points TELEGRAM_PROXY_URL at (socks5h://xray:1080)
  # to reach api.telegram.org where it is blocked. Routing sends Telegram (and
  # everything else) through the `proxy` outbound; edit xray-config.json with
  # your own VLESS server. Until address/id are real the proxy outbound does
  # not work — set them, or point the routing rules at the `direct` outbound.
  # The image's default entrypoint runs `xray run -config /etc/xray/config.json`.
  xray:
    image: teddysun/xray:latest
    volumes:
      - ./xray-config.json:/etc/xray/config.json:ro

volumes:
  postgres-data:
  rustfs-data:
  browser-data:
